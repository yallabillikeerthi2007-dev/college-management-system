<html>
<head>

<title>Login Page</title>

<style>

body
{
margin:0;
font-family:Arial,sans-serif;
background:#f2f2f2;
}

/* Header */

.header
{
background:#004aad;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

/* Login Box */

form
{
width:400px;
margin:70px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

label
{
font-weight:bold;
display:block;
margin-top:10px;
}

input,
select
{
width:95%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

/* Button */

#btn
{
width:100%;
padding:12px;
background:#004aad;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

#btn:hover
{
background:#003580;
}

</style>

<script>

function LoginValidation()
{
let role=document.getElementById("role").value;

let uname=document.getElementById("uname").value;

let pass=document.getElementById("password").value;

if(role==="")
{
alert("Select Role");
return false;
}

if(uname==="")
{
alert("Enter Username");
return false;
}

if(pass==="")
{
alert("Enter Password");
return false;
}

return true;
}

</script>

</head>

<body>

<div class="header">

GOVT POLYTECHNIC ANAKAPALLI

</div>

<form method="POST"
action="login.php">

<label>Select Role</label>

<select name="role"
id="role">

<option value="">
Choose Role
</option>

<option value="Admin">
Admin
</option>

<option value="Student">
Student
</option>

</select>

<label>Username</label>

<input type="text"
name="uname"
id="uname">

<label>Password / Student Id</label>

<input type="password"
name="password"
id="password">

<button type="submit"
id="btn"
onclick="return LoginValidation()">

Login

</button>

</form>

</body>

</html>
